<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HBH Illegal Creator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app" class="hidden">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">HBH</div>
                <div>
                    <h1>Illegal Creator</h1>
                    <p>Activiteiten beheren</p>
                </div>
            </div>

            <button id="newActivity" class="primary full">+ Nieuwe activiteit</button>
            <input id="search" class="search" placeholder="Zoeken..." />
            <div id="activityList" class="activity-list"></div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <h2 id="editorTitle">Geen activiteit geselecteerd</h2>
                    <p id="editorSub">Maak of selecteer een activiteit.</p>
                </div>
                <div class="top-actions">
                    <button id="themeToggle" class="ghost">Licht/donker</button>
                    <button id="deleteActivity" class="danger">Verwijderen</button>
                    <button id="saveActivity" class="primary">Opslaan</button>
                    <button id="close" class="ghost">Sluiten</button>
                </div>
            </header>

            <nav class="tabs">
                <button class="tab active" data-tab="basis">Basis</button>
                <button class="tab" data-tab="stappen">Actiepunten</button>
                <button class="tab" data-tab="items">Items & rewards</button>
                <button class="tab" data-tab="drugs">Drugs</button>
                <button class="tab" data-tab="bouwer">Visuele bouwer</button>
                <button class="tab" data-tab="politie">Politie</button>
                <button class="tab" data-tab="witwas">Witwassen</button>
                <button class="tab" data-tab="instellingen">Instellingen</button>
            </nav>

            <section id="panel" class="panel empty">
                <div class="empty-state">
                    <div class="logo big">HBH</div>
                    <h3>Selecteer of maak een activiteit</h3>
                    <p>Gebruik de creator om witwas, drugs, craft, transport, lab, dropoff en custom illegale activiteiten te bouwen.</p>
                </div>
            </section>
        </main>

        <div id="nuiModal" class="modal hidden" aria-hidden="true">
            <div class="modal-card">
                <h3 id="modalTitle">Bevestigen</h3>
                <p id="modalMessage">Weet je het zeker?</p>
                <div id="modalInputWrap" class="field hidden">
                    <label id="modalInputLabel">Naam</label>
                    <input id="modalInput" type="text" maxlength="64" />
                </div>
                <div class="modal-actions">
                    <button id="modalCancel" class="ghost">Annuleren</button>
                    <button id="modalOk" class="primary">Bevestigen</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
